name: Auto Release

# Cuts an experiments release for a Lens Desktop version: the monorepo sends
# lens-release-published with { lensVersion } for every Lens release, and
# backfill-releases.yml (or a human) dispatches it manually; this pushes the
# next tag and dispatches release.yml on it. The tag-ref indirection is
# load-bearing — the S3 OIDC role only trusts tag refs, and neither
# repository_dispatch nor workflow_dispatch runs on one.
on:
  workflow_dispatch:
    inputs:
      lens_version:
        description: "Lens version to cut a release for (e.g. 2025.12.301234-latest)"
        required: true
  repository_dispatch:
    types:
      - lens-release-published

permissions:
  contents: write # push the release tag
  actions: write # dispatch release.yml

# Serialize runs per Lens version so concurrent dispatches for the same
# version cannot compute the same tag; distinct versions proceed in parallel.
concurrency:
  group: auto-release-${{ github.event.client_payload.lensVersion || github.event.inputs.lens_version }}
  cancel-in-progress: false

jobs:
  tag-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine release parameters
        id: params
        # -internal builds are employee-only → dev experiments; else prod.
        env:
          LENS_VERSION: ${{ github.event.client_payload.lensVersion || github.event.inputs.lens_version }}
        run: |
          if ! [[ "$LENS_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[a-z]+)?$ ]]; then
            echo "Invalid lens version: '$LENS_VERSION'" >&2
            exit 1
          fi

          case "$LENS_VERSION" in
            *-internal) channel="dev" ;;
            *) channel="prod" ;;
          esac

          echo "lens_version=$LENS_VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Compute next release tag
        id: tag
        # <lensVersion>.<numericSuffix> (see .knowledge/cross-repo.md);
        # highest existing suffix + 1, starting at 1.
        env:
          LENS_VERSION: ${{ steps.params.outputs.lens_version }}
        run: |
          tags="$(git ls-remote --tags origin "refs/tags/${LENS_VERSION}.*")"
          next=1

          while read -r _sha ref; do
            tag="${ref#refs/tags/}"
            suffix="${tag#"${LENS_VERSION}".}"

            if [ "$suffix" != "$tag" ] && [[ "$suffix" =~ ^[0-9]+$ ]] && (( suffix >= next )); then
              next=$((suffix + 1))
            fi
          done <<< "$tags"

          echo "tag=${LENS_VERSION}.${next}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG"

      - name: Dispatch release workflow on the tag
        # Retried: the API may briefly not know the just-pushed tag ref.
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          CHANNEL: ${{ steps.params.outputs.channel }}
        run: |
          for attempt in 1 2 3 4 5; do
            if gh workflow run release.yml \
              --ref "refs/tags/$TAG" \
              -f tag="$TAG" \
              -f channel="$CHANNEL"; then
              exit 0
            fi

            sleep 5
          done

          echo "Failed to dispatch release.yml for $TAG" >&2
          exit 1
