name: Release

on:
  push:
    tags:
      # Match the consumer's expected tag pattern: <lensVersion>.<numericSuffix>
      # (e.g. 2025.12.0.3). The Lens Desktop client refuses anything else.
      - "[0-9]*.[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, format <lensVersion>.<numericSuffix> (e.g. 2025.12.0.3)"
        required: true

permissions:
  contents: write
  packages: read
  id-token: write # required for OIDC assume-role into AWS for S3 uploads

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Build
        run: npm run build

      - name: Generate runtime package.json
        run: npm run generate-package-json

      - name: Sign bundles
        run: npm run sign
        env:
          EXPERIMENT_SIGNING_PRIVATE_KEY: ${{ secrets.EXPERIMENT_SIGNING_PRIVATE_KEY }}

      - name: Generate manifest
        run: npm run manifest

      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          cp dist/manifest.json release-artifacts/

          for experiment_dir in experiments/*/; do
            [ -d "${experiment_dir}dist" ] || continue
            pkg="${experiment_dir}package.json"
            [ -f "$pkg" ] || continue

            id=$(node -e "console.log(require('./${pkg}').experiment.id)")
            version=$(node -e "console.log(require('./${pkg}').version)")

            bundle="${experiment_dir}dist/index.js"
            sig="${bundle}.sig"
            [ -f "$bundle" ] || continue

            cp "$bundle" "release-artifacts/${id}-${version}.js"
            [ -f "$sig" ] && cp "$sig" "release-artifacts/${id}-${version}.js.sig"

            runtime_pkg="${experiment_dir}dist/package.json"
            runtime_pkg_sig="${runtime_pkg}.sig"
            [ -f "$runtime_pkg" ] && cp "$runtime_pkg" "release-artifacts/${id}-${version}.package.json"
            [ -f "$runtime_pkg_sig" ] && cp "$runtime_pkg_sig" "release-artifacts/${id}-${version}.package.json.sig"
          done

          ls -la release-artifacts/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Derive Lens version from tag
        id: lens_version
        run: |
          # Tag pattern is <lensVersion>.<numericSuffix>, e.g. 2025.12.0.3 →
          # Lens version 2025.12.0. The pointer file is keyed by Lens version.
          tag="${{ steps.tag.outputs.tag }}"
          lens_version="${tag%.*}"
          echo "lens_version=$lens_version" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PUBLISHER_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Upload release artifacts to S3
        # Releases are content-addressed by tag — immutable, cache aggressively.
        run: |
          aws s3 sync release-artifacts/ \
            "s3://lens-labs-experiments-prod/releases/${{ steps.tag.outputs.tag }}/" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Update latest pointer
        # Pointer changes on each release; short cache so clients pick up new
        # tags within ~5 min even without CloudFront invalidations.
        run: |
          published_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > pointer.json <<EOF
          {
            "tag": "${{ steps.tag.outputs.tag }}",
            "publishedAt": "$published_at"
          }
          EOF

          aws s3 cp pointer.json \
            "s3://lens-labs-experiments-prod/latest/${{ steps.lens_version.outputs.lens_version }}.json" \
            --cache-control "public, max-age=300" \
            --content-type "application/json"

      - name: Create GitHub Release
        # Kept as a fallback distribution path and human-browsable release
        # notes during the transition. Drop in a follow-up PR once the S3
        # path is proven across a couple of release cycles.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: release-artifacts/*

      - name: Update floating latest-pointer GitHub release
        # Mirror of the S3 pointer at a predictable URL on GitHub. The client
        # tries the S3/CloudFront pointer first and falls back to this if S3
        # is unreachable. Marked prerelease so the GitHub UI does not
        # surface it as "Latest" — it is a pointer, not a release cut.
        #
        # URL pattern (predictable from <lensVersion>, no API call needed):
        #   https://github.com/lensapp/lens-desktop-experiments/releases/download/latest-<lensVersion>/pointer.json
        #
        # On first publish for a Lens version we create the floating release
        # and tag. On every subsequent publish we only replace the pointer.json
        # asset — the tag stays put. Tag-moving is non-idiomatic and breaks
        # anyone who has fetched it (git complains, pinned SHAs go stale).
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          floating_tag="latest-${{ steps.lens_version.outputs.lens_version }}"

          if ! gh release view "$floating_tag" >/dev/null 2>&1; then
            gh release create "$floating_tag" \
              --title "Pointer to latest ${{ steps.lens_version.outputs.lens_version }} release" \
              --notes "Auto-updated pointer for Lens version ${{ steps.lens_version.outputs.lens_version }}. The pointer.json asset contains { tag, publishedAt } for the most recent tagged release. The tag itself is stable; only the asset moves." \
              --prerelease \
              --target "${{ github.sha }}"
          fi

          gh release upload "$floating_tag" pointer.json --clobber